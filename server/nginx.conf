# tyingfund.com Nginx 配置
# [WHY] 反向代理 + 静态文件服务 + SSL
# [HOW] 放到 /etc/nginx/sites-available/tyingfund.com

server {
    listen 80;
    server_name tyingfund.com www.tyingfund.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tyingfund.com www.tyingfund.com;

    # SSL 证书（Cloudflare 或 Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/tyingfund.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tyingfund.com/privkey.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ========== 前端静态文件 ==========
    root /opt/fund-app/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== 后端 API 代理 ==========
    # Node.js 代理服务
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # 东方财富 API 代理（通过 Node.js 服务）
    location /tiantian/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /eastmoney/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /push2/ {
        proxy_pass http://127.0.0.1:3000;
