// 绘制业绩走势图（带十字光标）
function drawTrendChart(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;

  // 使用传入的数据（不再截取，因为switchTrendPeriod已经截取好了）
  const recent = data;
  if (recent.length < 2) return;

  const values = recent.map(d => d.y);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const padding = { top: 20, right: 10, bottom: 30, left: 50 };
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;

  // 存储数据供交互使用
  canvas._chartMeta = { recent, min, max, range, padding, chartW, chartH, w, h, dpr };

  function draw(crosshairIdx) {
    ctx.clearRect(0, 0, w, h);
    // 背景
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim() || '#fff';
    ctx.fillRect(0, 0, w, h);

    // 网格线
    ctx.strokeStyle = 'rgba(128,128,128,0.15)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = padding.top + (chartH / 4) * i;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
      const rawVal = max - (range / 4) * i;
      const baseVal = recent[0]?.y || 1;
      const pctVal = baseVal > 0 ? ((rawVal - baseVal) / baseVal * 100) : 0;
      ctx.fillStyle = '#999';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText((pctVal >= 0 ? '+' : '') + pctVal.toFixed(1) + '%', padding.left - 5, y + 3);
    }

    // X轴标签
    ctx.fillStyle = '#999';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    [0, Math.floor(recent.length / 2), recent.length - 1].forEach(i => {
      const x = padding.left + (chartW / (recent.length - 1)) * i;
      const date = recent[i].x ? new Date(recent[i].x) : null;
      if (date) ctx.fillText(`${date.getMonth() + 1}/${date.getDate()}`, x, h - 8);
    });

    // 绘制曲线
    const isUp = values[values.length - 1] >= values[0];
    ctx.strokeStyle = isUp ? '#e74c3c' : '#27ae60';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    recent.forEach((d, i) => {
      const x = padding.left + (chartW / (recent.length - 1)) * i;
      const y = padding.top + chartH - ((d.y - min) / range) * chartH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 填充渐变
    const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
    if (isUp) {
      gradient.addColorStop(0, 'rgba(231,76,60,0.2)');
      gradient.addColorStop(1, 'rgba(231,76,60,0)');
    } else {
      gradient.addColorStop(0, 'rgba(39,174,96,0.2)');
      gradient.addColorStop(1, 'rgba(39,174,96,0)');
    }
    ctx.lineTo(padding.left + chartW, padding.top + chartH);
    ctx.lineTo(padding.left, padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // 标注高低点（基于收益率，而非净值）
    const startVal = recent[0]?.y || 1;
    let maxPct = -Infinity, minPct = Infinity;
    let maxIdx = 0, minIdx = 0;
    recent.forEach((d, i) => {
      const val = parseFloat(d.y);
      if (!isFinite(val) || val <= 0) return; // 跳过无效数据
      const pct = startVal > 0 ? ((val - startVal) / startVal * 100) : 0;
      if (isFinite(pct)) {
        if (pct > maxPct) { maxPct = pct; maxIdx = i; }
        if (pct < minPct) { minPct = pct; minIdx = i; }
      }
    });
    // 如果没有找到有效数据，使用默认值
    if (maxPct === -Infinity) maxPct = 0;
    if (minPct === Infinity) minPct = 0;
    const volatilityRange = maxPct - minPct; // 高点 - 低点 = 波动幅度

    // 绘制高低点标注
    function drawPointLabel(idx, pct, isHigh) {
      const x = padding.left + (chartW / (recent.length - 1)) * idx;
      const y = padding.top + chartH - ((recent[idx].y - min) / range) * chartH;
      const color = isHigh ? '#e74c3c' : '#27ae60';
      // 圆点
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // 标签文字
      const label = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      const labelY = isHigh ? y - 12 : y + 22;
      ctx.fillText(label, x, labelY);
    }
    drawPointLabel(maxIdx, maxPct, true);
    drawPointLabel(minIdx, minPct, false);

    // 绘制波动幅度标注（高点与低点之间）
    const maxX = padding.left + (chartW / (recent.length - 1)) * maxIdx;
    const minX = padding.left + (chartW / (recent.length - 1)) * minIdx;
    const maxY = padding.top + chartH - ((recent[maxIdx].y - min) / range) * chartH;
    const minY = padding.top + chartH - ((recent[minIdx].y - min) / range) * chartH;
    // 画连接线
    ctx.strokeStyle = 'rgba(128,128,128,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(maxX, maxY);
    ctx.lineTo(minX, minY);
    ctx.stroke();
    ctx.setLineDash([]);

    // 十字光标
    if (crosshairIdx != null && crosshairIdx >= 0 && crosshairIdx < recent.length) {
      const cx = padding.left + (chartW / (recent.length - 1)) * crosshairIdx;
      const cy = padding.top + chartH - ((recent[crosshairIdx].y - min) / range) * chartH;

      // 竖线
      ctx.strokeStyle = 'rgba(128,128,128,0.5)';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(cx, padding.top);
      ctx.lineTo(cx, padding.top + chartH);
      ctx.stroke();
      // 横线
      ctx.beginPath();
      ctx.moveTo(padding.left, cy);
      ctx.lineTo(padding.left + chartW, cy);
      ctx.stroke();
      ctx.setLineDash([]);

      // 圆点
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = isUp ? '#e74c3c' : '#27ae60';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Tooltip
      const d = recent[crosshairIdx];
      const date = d.x ? new Date(d.x) : null;
      const dateStr = date ? `${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}` : '';
      const startVal = recent[0]?.y || 0;
      const retPct = startVal > 0 ? ((d.y - startVal) / startVal * 100) : 0;
      const valStr = (retPct >= 0 ? '+' : '') + retPct.toFixed(2) + '%';
      const tooltipText = `${dateStr}  ${valStr}`;
      ctx.font = '11px sans-serif';
      const tw = ctx.measureText(tooltipText).width + 14;
      const th = 24;
      let tx = cx - tw / 2;
      let ty = cy - th - 10;
      if (ty < padding.top - 5) ty = cy + 12;
      if (tx < padding.left) tx = padding.left;
      if (tx + tw > w - padding.right) tx = w - padding.right - tw;
      // tooltip 背景
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.beginPath();
      ctx.roundRect(tx, ty, tw, th, 4);
      ctx.fill();
      // tooltip 文字
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tooltipText, tx + tw / 2, ty + th / 2);
      ctx.textBaseline = 'alphabetic';
    }
  }

  draw(null);

  // 交互：触摸/鼠标十字光标
  function getIndex(clientX) {
    const r = canvas.getBoundingClientRect();
    const x = clientX - r.left;
    const idx = Math.round(((x - padding.left) / chartW) * (recent.length - 1));
    return Math.max(0, Math.min(recent.length - 1, idx));
  }

    let active = false;
  function onMove(clientX) {
    active = true;
    const idx = getIndex(clientX);
    draw(idx);
    // 更新上方日期显示
    const hoverDateEl = document.getElementById('trendHoverDate');
    if (hoverDateEl && recent[idx]) {
      const d = recent[idx];
      const date = d.x ? new Date(d.x) : null;
      const dateStr = date ? `${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}` : '';
      const start_val = recent[0]?.y || 0;
      const period_return = start_val > 0 ? ((d.y - start_val) / start_val * 100) : 0;
      hoverDateEl.textContent = `${dateStr} ${period_return >= 0 ? '+' : ''}${period_return.toFixed(2)}%`;
      hoverDateEl.style.color = period_return >= 0 ? 'var(--red)' : 'var(--green)';
    }
  }
  function onEnd() {
    active = false;
    draw(null);
    // 恢复为最新日期显示
    const hoverDateEl = document.getElementById('trendHoverDate');
    if (hoverDateEl && recent.length > 0) {
      const latest = recent[recent.length - 1];
      const date = latest.x ? new Date(latest.x) : null;
      const dateStr = date ? `${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}` : '';
      const start_val = recent[0]?.y || 0;
      const period_return = start_val > 0 ? ((latest.y - start_val) / start_val * 100) : 0;
      hoverDateEl.textContent = `${dateStr} ${period_return >= 0 ? '+' : ''}${period_return.toFixed(2)}%`;
      hoverDateEl.style.color = period_return >= 0 ? 'var(--red)' : 'var(--green)';
    }
  }

  canvas.addEventListener('mousemove', e => { onMove(e.clientX); });
  canvas.addEventListener('mouseleave', onEnd);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
  canvas.addEventListener('touchend', onEnd);
  canvas.addEventListener('touchcancel', onEnd);
}
</script>
<!-- 浮动添加按钮 -->
<button class="fab" onclick="showAddSheet()" title="添加基金">+</button>
</body>
